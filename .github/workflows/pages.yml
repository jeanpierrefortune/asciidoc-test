name: Deploy AsciiDoc to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Asciidoctor
        run: sudo gem install asciidoctor rouge asciidoctor-kroki asciidoctor-pdf prawn-svg

      - name: Download Montserrat fonts
        run: |
          mkdir -p fonts
          BASE="https://raw.githubusercontent.com/google/fonts/main/ofl/montserrat/static"
          for variant in Regular Bold Italic BoldItalic; do
            curl -fsSLo "fonts/Montserrat-${variant}.ttf" "$BASE/Montserrat-${variant}.ttf"
            echo "Montserrat-${variant}.ttf: $(wc -c < fonts/Montserrat-${variant}.ttf) bytes"
          done

      - name: Convert logo SVG to PNG
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -f png -w 300 logo-calypso.svg -o logo-calypso.png

      - name: Convert AsciiDoc to HTML
        run: |
          asciidoctor api_specification.adoc \
            --out-file index.html \
            -a rouge-style=github \
            -a docinfo=shared

      - name: Convert AsciiDoc to PDF
        run: |
          asciidoctor-pdf api_specification.adoc \
            --out-file spec.pdf \
            -a pdf-theme=calypso \
            -a pdf-themesdir="$(pwd)" \
            -a pdf-fontsdir="$(pwd)/fonts" \
            -a imagesdir="$(pwd)" \
            -a allow-uri-read \
            -a revdate="$(date +'%Y-%m-%d')"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
