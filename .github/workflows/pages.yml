name: Deploy AsciiDoc to GitHub Pages

on:
  push:
    branches: [main]
  workflow_dispatch:

permissions:
  contents: read
  pages: write
  id-token: write

concurrency:
  group: pages
  cancel-in-progress: false

jobs:
  build:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install Asciidoctor
        run: sudo gem install asciidoctor rouge asciidoctor-kroki asciidoctor-pdf prawn-svg

      - name: Convert logo SVG to PNG
        run: |
          sudo apt-get install -y librsvg2-bin
          rsvg-convert -f png -w 400 logo-calypso.svg -o logo-calypso.png

      - name: Convert AsciiDoc to HTML
        run: |
          asciidoctor spec.adoc \
            --out-file index.html \
            -a rouge-style=github \
            -a source-highlighter=rouge \
            -a icons=font \
            -a docinfo=shared

      - name: Convert AsciiDoc to PDF
        run: |
          asciidoctor-pdf spec.adoc \
            --out-file spec.pdf \
            -a pdf-theme=pdf-theme.yml \
            -a pdf-themesdir=. \
            -a imagesdir=. \
            -a allow-uri-read \
            -a icons=font \
            -a revdate="$(date +'%Y-%m-%d')"

      - name: Setup Pages
        uses: actions/configure-pages@v5

      - name: Upload artifact
        uses: actions/upload-pages-artifact@v3
        with:
          path: '.'

  deploy:
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}
    runs-on: ubuntu-latest
    needs: build
    steps:
      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4
