<link href="https://fonts.googleapis.com/css2?family=Montserrat:wght@400;600;700&display=swap" rel="stylesheet">
<style>
/* Police */
body {
  font-family: 'Montserrat', sans-serif;
}

/* Liens */
a, a:link, a:visited {
  color: #039efd;
}
a:hover {
  color: #039efd;
  text-decoration: none;
  font-weight: bold;
}

/* Liens externes : suffixe ↗ */
a[href^="http"]:not(:has(img)):not(:has(i))::after {
  content: "\00a0↗";
  font-size: 0.85em;
  font-weight: normal;
}

/* Tables */
thead {
  background-color: #ddd;
}
table > tbody > tr:nth-child(odd) > td,
table > tbody > tr:nth-child(odd) > th {
  background-color: #f9f9f9;
}

/* Code */
code {
  background-color: #f8f8f8;
  border-radius: 3px;
  padding: .2em .4em;
}

/* Footer */
#footer {
  background-color: #039efd;
  color: #fff;
}
#footer a, #footer a:hover {
  color: #fff;
}

/* TOC : défilement indépendant sur grands écrans */
#toc.toc2 {
  position: fixed;
  top: 0;
  bottom: 0;
  overflow-y: auto;
}

/* Responsive : TOC en haut sur mobile */
@media (max-width: 768px) {
  body.toc2 { padding-left: 0 !important; }
  #toc.toc2 { position: static !important; width: 100% !important; }
}
</style>
