<!-- =========================================================================
     docinfo.html  —  Charte graphique "Calypsonet Terminal API" (Hugo Blox)
     appliquée à la sortie Asciidoctor.

     Inséré en fin de <head> via :  -a docinfo=shared  -a docinfodir=assets
     Placé APRÈS la feuille Asciidoctor par défaut ET après le style rouge
     github embarqué (-a rouge-style=github), donc il surcharge la PROSE
     (fontes + couleurs) sans toucher aux COULEURS de coloration syntaxique
     de rouge : aucune règle ci-dessous ne cible les jetons rouge
     (pas de `.highlight .k`, `.highlight .s`, etc.) ni le fond des blocs
     de code. On ne fait qu'harmoniser la fonte mono des blocs de code.
     ========================================================================= -->

<!-- Fonte du thème : Montserrat pour tout le texte (corps + titres).
     Seul le code reste en monospace système. -->
<link rel="preconnect" href="https://fonts.googleapis.com">
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
<link rel="stylesheet"
      href="https://fonts.googleapis.com/css2?family=Montserrat:ital,wght@0,400;0,500;0,600;0,700;1,400&display=swap">

<style>
  :root {
    /* ---- Couleurs extraites de custom.scss / du site ---- */
    --cna-brand:        #039efd;  /* bleu de marque (meta-theme-color, footer, nav) */
    --cna-link:         #039efd;  /* liens */
    --cna-link-alt:     #0062cc;  /* bleu d'accent secondaire (onglets) */
    --cna-ink:          #3b3b3a;  /* gris foncé de marque -> titres / texte fort */
    --cna-code-bg:      #f8f8f8;  /* fond du code en ligne */
    --cna-thead-bg:     #dddddd;  /* fond d'en-tête de tableau */
    --cna-row-alt:      #f9f9f9;  /* lignes impaires de tableau */

    /* ---- Fontes ---- */
    --font-body: 'Montserrat', -apple-system, BlinkMacSystemFont, 'Segoe UI',
                 Helvetica, Arial, sans-serif;
    --font-head: var(--font-body);  /* titres aussi en Montserrat */
    --font-mono: monospace;          /* le code reste sur monospace système */
  }

  /* ---------- Corps de texte ---------- */
  body {
    font-family: var(--font-body);
  }

  /* ---------- Titres ---------- */
  h1, h2, h3, h4, h5, h6,
  #header h1, #toctitle,
  .sect1 > h2, .sect2 > h3, .sect3 > h4 {
    font-family: var(--font-head);
    color: var(--cna-ink);
    font-weight: 700;
  }

  /* Filet bleu de marque sous les titres de section (rappel "docs") */
  #content h2 {
    border-bottom: 2px solid var(--cna-brand);
    padding-bottom: .25rem;
  }

  /* ---------- Liens (couleur + hover en gras, comme le site) ---------- */
  a {
    color: var(--cna-link);
  }
  a:hover {
    color: var(--cna-link);
    text-decoration: none;
    font-weight: bold;
  }

  /* ---------- Table des matières ---------- */
  #toctitle { color: var(--cna-ink); }
  #toc a    { color: var(--cna-link); }

  /* ---------- Tableaux ---------- */
  table.tableblock thead th,
  table.tableblock thead {
    background-color: var(--cna-thead-bg);
    color: var(--cna-ink);
  }
  table.tableblock tbody tr:nth-child(odd) > * {
    background-color: var(--cna-row-alt);
  }

  /* ---------- Code EN LIGNE uniquement ----------
     `*:not(pre) > code` cible le code inline ; le code des blocs
     (pre > code) est exclu pour ne PAS perturber rouge github.        */
  *:not(pre) > code {
    font-family: var(--font-mono);
    font-size: .95em;
    background-color: var(--cna-code-bg);
    border-radius: 3px;
    padding: .2em .4em;
  }

  /* ---------- Blocs de code : FONTE seulement, jamais les couleurs ----------
     On harmonise la police mono ; on ne touche ni au fond ni aux
     couleurs de jetons gérés par rouge (style github).                */
  .listingblock pre,
  .listingblock pre.highlight,
  .listingblock pre.highlight code,
  pre.rouge, pre.rouge code {
    font-family: var(--font-mono);
  }

  /* ---------- Flèche ↗ après les liens externes (reprise du custom.scss) ----------
     Exclut le domaine du projet, et les liens contenant une image ou une icône. */
  a[href^="http"]:not([href*="//terminal-api.calypsonet.org"]):not(:has(img)):not(:has(i))::after {
    content: "\00a0↗";
    font-size: 0.85em;
  }
</style>
