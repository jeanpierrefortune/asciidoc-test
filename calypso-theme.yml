extends: default

header:
  height: 1in
  border_color: '039efd'
  border_width: 0.5
  padding: [6, 12, 6, 12]
  font_size: 9
  start_at: body
  recto:
    left:
      content: image:logo-calypso.png[pdfwidth=1.2in]
    right:
      content: '{doctitle}'
  verso:
    left:
      content: image:logo-calypso.png[pdfwidth=1.2in]
    right:
      content: '{doctitle}'

footer:
  height: 0.4in
  border_color: '039efd'
  border_width: 0.5
  padding: [4, 12, 4, 12]
  font_size: 8
  font_color: '6b7280'
  start_at: body
  recto:
    left:
      content: '{revdate}'
    right:
      content: '{page-number} / {page-count}'
  verso:
    left:
      content: '{revdate}'
    right:
      content: '{page-number} / {page-count}'
