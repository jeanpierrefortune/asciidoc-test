header:
  # On ajuste légèrement la hauteur si on augmente le padding du haut
  height: 0.7in
  border_color: '039efd'
  border_width: 0.5
  # MODIFICATION ICI :
  # 24 : espace augmenté au-dessus du contenu
  # 12 : espace à droite
  # 8  : espace en bas
  # 0  : aucun espace à gauche (alignement parfait sur la ligne bleue)
  padding: [24, 12, 8, 0]
  font_size: 9
  start_at: body
  recto:
    left:
      content: image:logo-calypso.png[pdfwidth=1.2in]
    right:
      content: '{doctitle}'
  verso:
    left:
      content: image:logo-calypso.png[pdfwidth=1.2in]
    right:
      content: '{doctitle}'